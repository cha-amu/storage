name: Sync storage repo

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'posts/**'
      - 'assets/**'
      - 'scripts/sync-storage-repo.mjs'
      - 'tests/**'
      - 'package.json'
      - '.github/workflows/sync.yml'
  schedule:
    - cron: '17 * * * *'

permissions:
  contents: write

concurrency:
  group: storage-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout storage repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Test storage sync client
        run: npm test

      - name: Sync Sheets and storage manifests
        env:
          STORAGE_BASE_URL: https://cha-amu.github.io/storage
          API_URL: ${{ vars.API_URL || 'https://cha-amu-gateway.cha-amu.workers.dev/api' }}
          STORAGE_SYNC_SECRET: ${{ secrets.STORAGE_SYNC_SECRET }}
        run: |
          test -n "$API_URL" || { echo "::error::API_URL is required"; exit 1; }
          test -n "$STORAGE_SYNC_SECRET" || { echo "::error::STORAGE_SYNC_SECRET is required"; exit 1; }
          npm run sync

      - name: Commit storage changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet && exit 0
          git commit -m "Sync storage manifests"
          git push
