name: Sync storage repo

on:
  workflow_dispatch:
  schedule:
    - cron: '17 18 * * 0'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout storage repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Sync Sheets and storage manifests
        env:
          STORAGE_BASE_URL: https://cha-amu.github.io/storage
          APPS_SCRIPT_URL: ${{ vars.APPS_SCRIPT_URL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: npm run sync

      - name: Commit storage changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet && exit 0
          git commit -m "Sync storage manifests"
          git push
